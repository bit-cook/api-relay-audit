name: Standalone Drift Check

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  standalone-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Check standalone artifact and public metrics
        run: |
          python3 scripts/build-standalone.py --check
          python3 scripts/collect-metrics.py --check

      - name: Check dual-distribution parity
        run: python3 -m pytest tests/test_dual_distribution_parity.py -v
